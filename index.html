<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>6SadFox | Home</title>
    <meta name="description" content="6SadFox GitHub Pages starter site." />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="container">
      <h1>&gt; 6SadFox GitHub Pages</h1>
      <p class="subtitle">Cool black + green coding theme enabled.</p>

      <section class="terminal">
        <div class="terminal-bar">terminal :: production</div>
        <div class="terminal-content">

          <p>
            <strong>Live URL:</strong>
            <a href="https://6sadfoxapi.github.io">
              https://6sadfoxapi.github.io
            </a>
          </p>

          <p>
            <strong>Random Value:</strong>
            <span id="randomNumber">--</span>
          </p>

          <p style="margin-top:10px; color:#73c985;">
            Scraper: Coming Soon...
          </p>

        </div>
      </section>

      <footer>
        Built for GitHub Pages
      </footer>
    </main>

    <script>
      function generateNumber() {
        const num = Math.floor(Math.random() * 1000);
        document.getElementById("randomNumber").textContent = num;
      }

      // Run once immediately
      generateNumber();

      // Update every 3 seconds
      setInterval(generateNumber, 3000);
    </script>
  </body>
</html>
